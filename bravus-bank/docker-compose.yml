version: "3.9"
services:
  bravus-bank:
    build: .
    ports:
      - "8080:8080"
    environment:
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_FEE_PERCENT=${STRIPE_FEE_PERCENT:-10}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-http://localhost:8080/success}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-http://localhost:8080/cancel}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-brl}
      - STRIPE_CONNECT=${STRIPE_CONNECT:-false}
