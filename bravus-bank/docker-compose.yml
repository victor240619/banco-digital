services:
  db:
    image: postgres:15-alpine
    container_name: bravus-db
    environment:
      POSTGRES_DB: ${DB_NAME:-bravus}
      POSTGRES_USER: ${DB_USER:-bravus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bravus}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bravus-bank:
    build: .
    container_name: bravus-api
    ports:
      - "9000:9000"
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-bravus}
      - DB_USER=${DB_USER:-bravus}
      - DB_PASSWORD=${DB_PASSWORD:-bravus}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET nao definido! Copie .env.example para .env}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_FEE_PERCENT=${STRIPE_FEE_PERCENT:-10}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-http://localhost:5173/payment/success}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-http://localhost:5173/payment/cancel}
      - STRIPE_CURRENCY=${STRIPE_CURRENCY:-brl}
      - STRIPE_CONNECT=${STRIPE_CONNECT:-false}
      - JAVA_OPTS=-Xms256m -Xmx768m
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  dbdata:
    name: bravus_dbdata
