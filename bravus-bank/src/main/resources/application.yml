server:
  port: 8080

spring:
  application:
    name: bravus-bank
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bravus}
    username: ${DB_USER:bravus}
    password: ${DB_PASSWORD:bravus}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

stripe:
  apiKey: ${STRIPE_API_KEY:}
  webhookSecret: ${STRIPE_WEBHOOK_SECRET:}
  feePercent: ${STRIPE_FEE_PERCENT:10}
  successUrl: ${STRIPE_SUCCESS_URL:http://localhost:8080/success}
  cancelUrl: ${STRIPE_CANCEL_URL:http://localhost:8080/cancel}
  connect: ${STRIPE_CONNECT:false}
  defaultCurrency: ${STRIPE_CURRENCY:brl}
