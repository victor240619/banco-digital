server:
  port: 9000
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: bravus-bank
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bravus}
    username: ${DB_USER:bravus}
    password: ${DB_PASSWORD:bravus}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
    # Garante que o Flyway rode antes do JPA inicializar (já é o padrão, mas explícito é melhor)
    defer-datasource-initialization: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    com.bravus.bank: INFO
    org.flywaydb: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

stripe:
  apiKey: ${STRIPE_API_KEY:}
  webhookSecret: ${STRIPE_WEBHOOK_SECRET:}
  feePercent: ${STRIPE_FEE_PERCENT:10}
  successUrl: ${STRIPE_SUCCESS_URL:http://localhost:5173/payment/success}
  cancelUrl: ${STRIPE_CANCEL_URL:http://localhost:5173/payment/cancel}
  connect: ${STRIPE_CONNECT:false}
  defaultCurrency: ${STRIPE_CURRENCY:brl}
