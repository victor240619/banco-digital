<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Bravus Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { bg: { base: '#141414', elevated: '#1b2226', card: '#20272b' }, neon: { green: '#00d47e', blue: '#2aa8ff', amber: '#ffb400', red: '#ff4d4f' }, text: { primary: '#f2f2f2', secondary: '#a3a3a3', muted: '#737373' } }, fontFamily: { sans: ['Inter'], mono: ['JetBrains Mono'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-bg-base text-text-primary font-sans">
  <header class="sticky top-0 inset-x-0 h-16 backdrop-blur-xl bg-white/5 border-b border-white/10 flex items-center">
    <div class="max-w-6xl mx-auto w-full px-6 flex items-center justify-between">
      <div class="text-xl font-extrabold tracking-wider uppercase">
        <span class="text-text-secondary">Bravus</span> <span class="text-neon-green drop-shadow-[0_0_12px_rgba(0,212,126,0.8)]">Bank</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="logoutBtn" class="px-4 py-2 rounded-lg border border-white/10 text-text-secondary hover:text-text-primary">Sair</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8 space-y-8">
    <section class="grid md:grid-cols-4 gap-6" id="stats">
      <!-- Stat cards injected -->
    </section>

    <section class="rounded-2xl border border-white/10 bg-bg-card/70 backdrop-blur-xl p-8 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Usuários</h3>
      </div>
      <div id="users" class="overflow-x-auto"></div>
    </section>

    <section class="rounded-2xl border border-white/10 bg-bg-card/70 backdrop-blur-xl p-8 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Transações</h3>
      </div>
      <div id="txs" class="overflow-x-auto"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    function pill(text, color) {
      return `<span class="px-2 py-1 rounded-full text-xs ${color}">${text}</span>`;
    }

    async function load() {
      const statsRes = await BB.authFetch('/api/admin/dashboard');
      const usersRes = await BB.authFetch('/api/admin/users');
      const txsRes = await BB.authFetch('/api/admin/transactions');
      if (!statsRes.ok) { location.href='/login.html'; return; }
      const stats = await statsRes.json();
      const users = await usersRes.json();
      const txs = await txsRes.json();

      document.getElementById('stats').innerHTML = `
        ${[
          ['Usuários', stats.totalUsers],
          ['Ativos', stats.activeUsers],
          ['Transações', stats.totalTransactions],
          ['Saldo Total', new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(stats.totalBalance/100)]
        ].map(([k,v]) => `
          <div class="rounded-xl border border-white/10 bg-bg-card/70 p-6">
            <div class="text-xs uppercase text-text-secondary mb-2">${k}</div>
            <div class="text-2xl font-extrabold">${v}</div>
          </div>
        `).join('')}`;

      document.getElementById('users').innerHTML = `
        <table class="w-full text-sm">
          <thead class="text-text-secondary">
            <tr>
              <th class="text-left py-2">Usuário</th>
              <th class="text-left">Nome</th>
              <th class="text-left">Conta</th>
              <th class="text-left">Saldo</th>
              <th class="text-left">Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr class="border-t border-white/5">
                <td class="py-2">${u.username}</td>
                <td>${u.fullName}</td>
                <td class="font-mono">${u.accountNumber}</td>
                <td class="font-mono">${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(u.balance/100)}</td>
                <td>${u.isActive ? pill('Ativo','bg-emerald-600/40 text-emerald-300') : pill('Inativo','bg-red-600/40 text-red-300')}</td>
                <td class="text-right space-x-2">
                  <button onclick="activate(${u.id})" class="px-2 py-1 text-xs rounded border border-white/10">Ativar</button>
                  <button onclick="deactivate(${u.id})" class="px-2 py-1 text-xs rounded border border-white/10">Desativar</button>
                  <button onclick="removeUser(${u.id})" class="px-2 py-1 text-xs rounded border border-red-500/40 text-red-300">Remover</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;

      document.getElementById('txs').innerHTML = `
        <table class="w-full text-sm">
          <thead class="text-text-secondary">
            <tr>
              <th class="text-left py-2">Usuário</th>
              <th class="text-left">Tipo</th>
              <th class="text-left">Valor</th>
              <th class="text-left">Descrição</th>
              <th class="text-left">Status</th>
            </tr>
          </thead>
          <tbody>
            ${txs.map(t => `
              <tr class="border-t border-white/5">
                <td class="py-2">${t.username}</td>
                <td>${t.type}</td>
                <td class="font-mono">${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(t.amount/100)}</td>
                <td>${t.description || ''}</td>
                <td>${pill(t.status, t.status === 'COMPLETED' ? 'bg-emerald-600/40 text-emerald-300' : 'bg-amber-600/40 text-amber-300')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    async function activate(id){ const r = await BB.authFetch(`/api/admin/users/${id}/activate`, { method: 'PUT' }); if (r.ok) { BB.neonToast('Usuário ativado','success'); load(); } }
    async function deactivate(id){ const r = await BB.authFetch(`/api/admin/users/${id}/deactivate`, { method: 'PUT' }); if (r.ok) { BB.neonToast('Usuário desativado'); load(); } }
    async function removeUser(id){ if (!confirm('Remover usuário?')) return; const r = await BB.authFetch(`/api/admin/users/${id}`, { method: 'DELETE' }); if (r.ok) { BB.neonToast('Usuário removido','success'); load(); } }

    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('bb_token'); location.href='/'; });

    load();
  </script>
</body>
</html>
