# ============================================================
# Bravus Bank — Profile PROD (Render + Supabase)
# Ativo quando SPRING_PROFILES_ACTIVE=prod
# ============================================================

server:
  port: ${PORT:9000}
  forward-headers-strategy: native
  shutdown: graceful
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 1000
    connection-timeout: 20000

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.bravus.bank: INFO
    org.flywaydb: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
