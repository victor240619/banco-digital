# ============================================================
# Bravus Bank — Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec
# ============================================================

databases:
  - name: bravus-bank-db
    plan: basic-256mb
    diskSizeGB: 1
    region: oregon
    databaseName: bravus
    user: bravus
    postgresMajorVersion: "17"
    storageAutoscalingEnabled: false
    ipAllowList: []

services:
  # --- Backend (Spring Boot) ---
  - type: web
    name: bravus-bank-api
    runtime: docker
    plan: starter
    region: oregon                # Oregon é o que tem mais capacidade no Free
    dockerfilePath: ./bravus-bank/Dockerfile
    dockerContext: ./bravus-bank
    healthCheckPath: /actuator/health
    autoDeploy: true              # Deploy automático em cada push pro master
    branch: master
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "9000"
      - key: DATABASE_URL
        fromDatabase:
          name: bravus-bank-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: bravus-bank-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bravus-bank-db
          property: password
      - key: JWT_SECRET
        generateValue: true       # Render gera um secret seguro automaticamente
      - key: BRAVUS_BIOMETRIC_KEY
        generateValue: true       # Chave exclusiva para AES-256-GCM
      - key: BRAVUS_PASSWORD_RESET_GLOBAL_LIMIT
        value: "300"
      - key: CORS_ORIGIN
        value: "https://bravus-bank-240619.victor2406.chatgpt.site"
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=70.0"
