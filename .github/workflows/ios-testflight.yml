name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build iOS IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: bravus-bank-frontend
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      IOS_BUNDLE_ID: com.bravus.bank
      IOS_EXPORT_IPA: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bravus-bank-frontend/package-lock.json

      - name: Validate Apple secrets
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          missing=0
          for name in APPLE_TEAM_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_KEY_P8; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Write App Store Connect API key
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          umask 077
          key_file="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$key_file"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$key_file" "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$key_file" >> "$GITHUB_ENV"

      - name: Build signed IPA
        run: npm run ios:archive

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bravus-bank-ios-ipa
          path: bravus-bank-frontend/ios/App/build/export/*.ipa
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: ${{ inputs.upload }}
        shell: bash
        run: |
          ipa_path="$(find ios/App/build/export -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "::error::IPA not found after archive export"
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
